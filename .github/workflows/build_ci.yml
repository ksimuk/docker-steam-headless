name: Build and Deploy CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['**']
  pull_request:
    branches: [master]
  schedule:
    # At 02:30 on Saturday
    - cron: '30 2 * * 6'
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        flavour: ['cachy-v3']

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.flavour }}
          tags: |
            # Use latest for master/main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Use branch name for pull requests and pushes (sanitized)
            type=ref,event=branch
            type=ref,event=pr
            # Use sha for all builds with a fixed prefix
            type=sha,prefix=sha-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.flavour }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

 